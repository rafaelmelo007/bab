name: Bench Noise-Floor Recalibration

on:
  schedule:
    - cron: '0 3 * * 1'  # Weekly Monday 03:00 UTC on idle runner
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  recalibrate:
    name: Recalibrate bench baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Run bench 5× and compute CoV
        id: cov
        run: |
          node tests/bench/recalibrate.mjs
      - name: Commit updated baseline
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git add tests/bench/baseline.json
          git diff --cached --quiet || git commit -m "chore: recalibrate bench baseline"
          git push
