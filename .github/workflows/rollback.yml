name: Release Rollback

on:
  push:
    tags:
      - 'v*-rollback'

permissions:
  contents: write

jobs:
  rollback:
    name: Rollback npm + Homebrew + AUR
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'
      # Tag format: v1.2.3-rollback → BAD_VERSION=1.2.3
      - name: Extract bad version
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          BAD="${TAG%-rollback}"
          BAD="${BAD#v}"
          echo "bad_version=$BAD" >> "$GITHUB_OUTPUT"
      # Within 72h: npm unpublish; after 72h: npm deprecate (the workflow picks deprecate
      # as the safe fallback — operators can manually unpublish if still within window)
      - name: Deprecate bad version
        run: |
          npm deprecate "bab@${{ steps.ver.outputs.bad_version }}" \
            "REVERTED: see release rollback runbook docs/runbooks/release-rollback.md"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GH Release notice
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Rollback v${{ steps.ver.outputs.bad_version }}" \
            --notes "v${{ steps.ver.outputs.bad_version }} has been deprecated on npm. See docs/runbooks/release-rollback.md."
